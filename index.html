<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>عطاء - منصة التبرع</title>
    <meta name="description" content="منصة عطاء للتبرع وربط المتبرعين بالجمعيات الخيرية" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <!-- Tabler icons loaded via npm in main.tsx — CDN duplicate removed -->
    <script>
      (function() {
        const theme = localStorage.getItem('ap-theme') || 'dark';
        if (theme === 'dark') {
          document.documentElement.style.backgroundColor = '#070a13';
          document.documentElement.setAttribute('data-theme', 'dark');
        } else {
          document.documentElement.style.backgroundColor = '#f8fafc';
          document.documentElement.classList.add('ap-light-theme');
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Lightweight HTML/CSS loader placeholder (rendered instantly by browser) -->
      <div class="pl-fallback-root">
        <style>
          .pl-fallback-root {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #070a13;
            z-index: 99999;
          }
          .ap-light-theme .pl-fallback-root {
            background-color: #ffffff;
          }
          .pl-fallback-dots {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
          }
          .pl-fallback-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: #0066ff;
            animation: pl-fb-bounce 1.4s infinite ease-in-out both;
            box-shadow: 0 0 12px rgba(0, 102, 255, 0.55);
          }
          .ap-light-theme .pl-fallback-dot {
            background-color: #0052cc;
            box-shadow: 0 0 8px rgba(0, 82, 204, 0.35);
          }
          .pl-fallback-dot:nth-child(1) {
            animation-delay: -0.32s;
          }
          .pl-fallback-dot:nth-child(2) {
            animation-delay: -0.16s;
          }
          @keyframes pl-fb-bounce {
            0%, 80%, 100% {
              transform: scale(0.35);
              opacity: 0.2;
            }
            40% {
              transform: scale(1.3);
              opacity: 1;
            }
          }
        </style>
        <div class="pl-fallback-dots">
          <div class="pl-fallback-dot"></div>
          <div class="pl-fallback-dot"></div>
          <div class="pl-fallback-dot"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
